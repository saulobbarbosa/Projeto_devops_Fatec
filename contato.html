<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevStart</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-[#121212] text-white min-h-screen flex flex-col">
    <header class="flex justify-between items-center px-[18rem] py-3 border-1 
        border-1 border-neutral-900 border-b-neutral-800">
        <a href="./index.html" class="text-xl font-bold">
            Dev<span class="text-red-600">Start</span>
        </a>
        <div class="flex items-center gap-8">
            <a href="./index.html" class="text-neutral-400 text-sm p-2 hover:text-red-600">Home</a>
            <a href="./login.html" class="text-neutral-400 text-sm p-2 hover:text-red-600">Login</a>
            <a href="./contato.html" class="text-red-600 text-sm p-2">Contato</a>
        </div>
    </header>
    <main class="flex items-center justify-center flex-1">
        <div class="py-20 md:py-28 max-w-4xl mx-auto px-6">
            <h1 class="text-3xl md:text-4xl font-bold text-center mb-4">
                Entre em <span class="text-red-600">contato</span>
            </h1>
            <p class="text-center text-neutral-400 mb-12">
                Tem alguma dúvida ou sugestão? Mande uma mensagem para nós.
            </p>
            <div class="grid gap-12 md:grid-cols-2">
                <form class="space-y-5">
                    <div class="space-y-2">
                        <label for="name" class="text-sm font-medium">
                            Nome
                        </label>
                        <input id="name" placeholder="Seu nome"
                            class="w-full h-10 rounded-md border border-neutral-800 bg-[#121212] px-3 text-sm text-white placeholder:text-neutral-500 focus:outline-none focus:ring-2 focus:ring-red-600">
                    </div>
                    <div class="space-y-2">
                        <label for="email" class="text-sm font-medium">
                            Email
                        </label>
                        <input type="email" id="email" placeholder="seu@email.com"
                            class="w-full h-10 rounded-md border border-neutral-800 bg-[#121212] px-3 text-sm text-white placeholder:text-neutral-500 focus:outline-none focus:ring-2 focus:ring-red-600">
                    </div>
                    <div class="space-y-2">
                        <label for="message" class="text-sm font-medium">
                            Mensagem
                        </label>
                        <textarea id="message" rows="5" placeholder="Escreva sua mensagem..."
                            class="w-full rounded-md border border-neutral-800 bg-[#121212] px-3 py-2 text-sm text-white placeholder:text-neutral-500 focus:outline-none focus:ring-2 focus:ring-red-600"></textarea>
                    </div>
                    <button class="cursor-pointer w-full h-11 rounded-md bg-red-600 font-semibold text-sm transition hover:bg-red-700">
                        Enviar
                    </button>
                </form>
                <div class="space-y-6 flex flex-col justify-center">
                    <div class="flex items-center gap-3 text-neutral-400">
                        <i class="fa-regular fa-envelope text-red-600"></i>
                        <span class="text-sm">contato@devstart.com.br</span>
                    </div>
                    <div class="flex items-center gap-4 text-neutral-400">
                        <a href="#" class="hover:text-red-600 transition">
                            <i class="fa-brands fa-instagram text-lg"></i>
                        </a>
                        <a href="#" class="hover:text-red-600 transition">
                            <i class="fa-brands fa-github text-lg"></i>
                        </a>
                        <a href="#" class="hover:text-red-600 transition">
                            <i class="fa-brands fa-linkedin text-lg"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <footer class="flex items-center justify-center p-7 border-1 border-neutral-900 border-t-neutral-800">
        <p class="text-neutral-400 text-sm">© 2026 DevStart. Todos os direitos reservados.</p>
    </footer>
</body>

</html>
